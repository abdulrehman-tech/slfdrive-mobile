flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/slf-logo.png"
  min_sdk_android: 21
  
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/slf-logo.png"
  
  remove_alpha_ios: true
  
  web:
    generate: true
    image_path: "assets/images/slf-logo.png"
    background_color: "#FFFFFF"
    theme_color: "#0C2485"
  
  windows:
    generate: true
    image_path: "assets/images/slf-logo.png"
    icon_size: 48
  
  macos:
    generate: true
    image_path: "assets/images/slf-logo.png"
